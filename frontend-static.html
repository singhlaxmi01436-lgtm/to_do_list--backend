<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List (Static)</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    h1 { text-align: center; }
    ul { list-style-type: none; padding: 0; }
    li { background: #fff; margin: 10px 0; padding: 15px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Daily To-Do List</h1>
  <ul>
    <li>Morning Exercise</li>
    <li>Coding Practice</li>
    <li>College Classes</li>
    <li>Sports</li>
    <li>Web Development Learning</li>
    <li>Project Work</li>
    <li>Java Practice</li>
    <li>Python Practice</li>
    <li>Sleep</li>
  </ul>
</body>
</html>
