<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List (Advanced)</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      padding: 20px;
      min-height: 100vh;
      transition: background 0.5s, color 0.5s;
    }
    body.dark {
      background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
      color: #f4f4f4;
    }
    h1 {
      text-align: center;
      font-family: 'Pacifico', cursive;
      margin-bottom: 20px;
    }
    ul {
      list-style-type: none;
      padding: 0;
      max-width: 500px;
      margin: auto;
    }
    li {
      background: #fff;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, opacity 0.5s;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }
    body.dark li {
      background: #333;
      color: #f4f4f4;
    }
    li:hover {
      transform: scale(1.03);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    input[type="checkbox"] {
      margin-right: 10px;
    }
    button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.2);
    }
    #newTask {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 70%;
      margin-right: 10px;
    }
    #addBtn {
      padding: 10px 15px;
      border-radius: 5px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    #addBtn:hover {
      background: #388E3C;
    }
    #toggleTheme {
      display: block;
      margin: 20px auto;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    #toggleTheme:hover {
      background: #555;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      font-family: 'Pacifico', cursive;
    }
  </style>
</head>
<body>
  <h1>Daily To-Do List</h1>
  <div style="text-align:center;">
    <input id="newTask" type="text" placeholder="Add new task...">
    <button id="addBtn" onclick="addTask()">➕</button>
  </div>
  <ul id="taskList"></ul>
  <button id="toggleTheme">🌙 Toggle Dark Mode</button>
  <footer>✨ Created by Ayushman ✨</footer>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";
      tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span>
            <input type="checkbox" ${task.done ? "checked" : ""} onclick="toggleTask(${index})">
            ${task.done ? "✅ " : ""}${task.text}
          </span>
          <button onclick="deleteTask(${index})">🗑️</button>
        `;
        list.appendChild(li);
      });
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById("newTask");
      if (input.value.trim() !== "") {
        tasks.push({ text: input.value, done: false });
        input.value = "";
        renderTasks();
      }
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }

    document.getElementById("toggleTheme").addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });

    if (tasks.length === 0) {
      ["Morning Exercise","Coding Practice","College Classes","Sports",
       "Web Development Learning","Project Work","Java Practice",
       "Python Practice","Sleep"].forEach(t => tasks.push({text:t,done:false}));
    }
    renderTasks();
  </script>
</body>
</html>
